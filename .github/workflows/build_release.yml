name: Build and Release TikGood APKs

on:
  push:
    branches:
      - "**"

# This block is CRITICAL for the automatic GITHUB_TOKEN to have permission 
# to create a release and upload files.
permissions:
  contents: write

jobs:
  build_release:
    # Only runs if the commit message contains 'build release'
    if: contains(github.event.head_commit.message, 'build release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.2" # Matches your specific version
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build APKs
        run: |
          for VERSION in 7 8; do
            # Optimized: Build both platforms in a single command per version
            flutter build apk --release \
              --target-platform android-arm64,android-x64 \
              --split-per-abi \
              --build-name=${VERSION}.0.0 \
              --build-number=${VERSION}

            # Rename for clarity in the release assets
            mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
               build/app/outputs/flutter-apk/tikgood-v${VERSION}-arm64.apk
               
            mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
               build/app/outputs/flutter-apk/tikgood-v${VERSION}-x64.apk
          done

      - name: Create GitHub Release and Upload APKs
        uses: ncipollo/release-action@v1
        with:
          tag: rel-${{ github.sha }}
          name: TikGood Release ${{ github.sha }}
          allowUpdates: true
          body: |
            Automated build release from commit: ${{ github.event.head_commit.message }}
          artifacts: "build/app/outputs/flutter-apk/tikgood-*.apk"
          token: ${{ github.token }}