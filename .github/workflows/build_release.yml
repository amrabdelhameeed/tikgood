name: Build and Release TikGood APKs

on:
  push:
    branches:
      - "**"

jobs:
  build_release:
    if: contains(github.event.head_commit.message, 'build release')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.2"
          channel: "stable"
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            build/
            android/.gradle/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/*.gradle*','pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Run Analyzer
        run: flutter analyze
        continue-on-error: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build APKs for v7 and v8
        run: |
          for VERSION in 7 8; do
            flutter build apk --release \
              --target-platform android-arm64 \
              --split-per-abi \
              --build-name=${VERSION}.0.0 \
              --build-number=${VERSION}
            mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
               build/app/outputs/flutter-apk/tikgood-v${VERSION}-arm64.apk

            flutter build apk --release \
              --target-platform android-x64 \
              --split-per-abi \
              --build-name=${VERSION}.0.0 \
              --build-number=${VERSION}
            mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
               build/app/outputs/flutter-apk/tikgood-v${VERSION}-x64.apk
          done

      - name: Create or Update GitHub Release and Upload APKs
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.sha }}
          name: TikGood Release ${{ github.sha }}
          body: |
            Automated build release from commit: ${{ github.event.head_commit.message }}
          files: |
            build/app/outputs/flutter-apk/tikgood-*.apk