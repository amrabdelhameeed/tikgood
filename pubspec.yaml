name: tikgood
description: TikGood - TikTok-style video note-taking app for courses.
publish_to: none
version: 0.0.1+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  android_pip: ^2.0.2
  avatar_plus: ^0.0.5
  background_on_back: ^1.0.1
  bloc: 8.1.4
  clarity_flutter: ^1.3.2
  cloud_firestore: 5.6.12
  crypto: ^3.0.7
  device_info_plus: ^12.3.0
  easy_localization: ^3.0.3
  file_picker: ^8.0.6
  firebase_analytics: ^11.5.2
  firebase_auth: ^5.6.2
  firebase_core: ^3.15.1
  firebase_crashlytics: ^4.3.9
  firebase_messaging: ^15.0.4
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_local_notifications: 18.0.1
  timezone: ^0.9.4
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.9
  go_router: ^13.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.1.0
  image_picker: ^1.2.1
  intl: 0.20.2
  lottie: ^3.3.1
  marquee: ^2.3.0
  media_kit: ^1.1.10
  media_kit_libs_video: ^1.0.4
  media_kit_video: ^1.2.4
  notion_db_sdk: ^0.1.0
  path_provider: ^2.1.2
  pdf: ^3.11.3
  permission_handler: ^12.0.1
  printing: ^5.13.3
  record: ^6.1.2
  send_to_background: ^0.0.5
  sensors_plus: ^7.0.0
  shared_preferences: ^2.2.2
  # timezone: ^0.10.0
  upgrader: ^12.5.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  video_thumbnail: ^0.5.6
  waveform_flutter: ^1.2.0
dev_dependencies:
  build_runner: ^2.4.8
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/translations/
    - assets/icons/TikTokIcons.ttf
    - shorebird.yaml

  fonts:
    - family: TikTokIcons
      fonts:
        - asset: assets/icons/TikTokIcons.ttf
    - family: tiktok
      fonts:
        - asset: assets/fonts/tiktok/tiktok.ttf
          weight: 400
        - asset: assets/fonts/tiktok/tiktok_bold.ttf
          weight: 700
flutter_native_splash:
  color: "#000000"
  image: assets/logo.png
  fullscreen: true

  android_12:
    color: "#000000"
    image: assets/logo.png
    icon_background_color: "#000000"

##################################################
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 24 # android min sdk min:16, default 21
  background_color: "#000000"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.png"
  notification_icon: "assets/logo.png"
  notification_background_color: "transparent"
  notification_color: "#000000"
  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48 # min:48, max:256, default: 48
